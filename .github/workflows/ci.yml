name: CI

on:
  push:
    branches: ["**"]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: vet & test (Go ${{ matrix.go }} / ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        go: ["1.25.x"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go }}
          check-latest: true

      - name: Build
        run: go build ./...

      - name: gofmt
        run: |
          fmt=$(gofmt -l .)
          if [ -n "$fmt" ]; then echo "unformatted:"; echo "$fmt"; exit 1; fi

      - name: Vet
        run: go vet ./...

      # Default suite only - the `integration` tag drives the real Gyroflow
      # binary, which is not installed on CI runners.
      - name: Test
        run: go test ./...
